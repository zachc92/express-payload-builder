<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Express Payload Builder</title><script defer="defer" src="main.js"></script></head><body><div id="sidebar"><h3>Express Sample Payload Builder</h3></div><div id="main-body"><div id="form-workspace-stack"><form action="" id="merchant-credentials-form"><h3>Processing Credentials</h3><label for="account-id">Account ID</label> <input type="text" name="account-id" id="account-id" required minlength="7" maxlength="10" autocomplete="off"> <label for="account-token">Account Token</label> <input type="text" name="account-token" id="account-token" required minlength="72" maxlength="140"> <label for="acceptor-id">Acceptor ID</label> <input type="text" name="acceptor-id" id="acceptor-id" required minlength="9" maxlength="50" autocomplete="off"> <label for="application-id">Application ID</label> <input type="text" name="application-id" id="application-id" required minlength="4" maxlength="40" autocomplete="off"> <label for="application-name">Application Name</label> <input type="text" name="application-name" id="application-name" required minlength="3" maxlength="50" autocomplete="off"> <button type="submit">Submit Credentials</button></form><form action="" id="transaction-payload-form"><h3>Transaction Information</h3><label for="market-code">Market Code</label> <select name="market-code" id="market-code"><option value="ecomm">Ecommerce</option><option value="moto">Direct Marketing (MOTO)</option></select> <label for="transaction-type">Transaction Type</label> <select name="transaction-type" id="transaction-type"><option value="sale">Sale</option><option value="authorization">Authorization</option><option value="authorization-completion">Authorization Completion</option><option value="reversal">Reversal</option><option value="return">Return</option></select> <label for="transaction-amount">Transaction Amount</label> <input type="text" name="transaction-amount" id="transaction-amount" required> <label for="transaction-reference-number">Reference Number</label> <input type="text" name="transaction-reference-number" id="transaction-reference-number" required> <label for="transaction-ticket-number">Ticket Number</label> <input type="text" name="transaction-ticket-number" id="transaction-ticket-number" required><div class="follow-up"><label for="transaction-id">TransactionID</label> <input type="text" name="transaction-id" id="transaction-id"></div><button type="submit">Generate Request</button></form></div><div id="generated-request"></div></div><div id="alert-modal"></div></body></html>
