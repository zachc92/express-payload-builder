<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Payload Builder</title>
</head>
<body>

    <div id="sidebar">
        <h3>Express Sample Payload Builder</h3>
    </div>
    <div id="main-body">
        <form action="" id="merchant-credentials-form">
            <h3>Processing Credentials</h3>
            <label for="account-id">Account ID</label>
            <input type="text" name="account-id" id="account-id" required minlength="7" maxlength="10" autocomplete="off">
            <label for="account-token">Account Token</label>
            <input type="password" name="account-token" id="account-token" required minlength="72" maxlength="140">
            <label for="acceptor-id">Acceptor ID</label>
            <input type="text" name="acceptor-id" id="acceptor-id" required minlength="9" maxlength="50" autocomplete="off">
            <label for="application-id">Application ID</label>
            <input type="text" name="application-id" id="application-id" required minlength="4" maxlength="40" autocomplete="off">
            <label for="application-name">Application Name</label>
            <input type="text" name="application-name" id="application-name" required minlength="3" maxlength="50" autocomplete="off">
            <button type="submit">Submit Credentials</button>
        </form>
    </div>
    
</body>
</html>
